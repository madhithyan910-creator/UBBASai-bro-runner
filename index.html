<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UBBA41 Legends Run 🔥</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Audio elements -->
  <audio id="bgMusic" preload="auto"></audio>
  <audio id="voice1" preload="auto"></audio>
  <audio id="voice2" preload="auto"></audio>
  <audio id="runSound" preload="auto"></audio>
  <audio id="coinSound" preload="auto"></audio>
  <audio id="jumpSound" preload="auto"></audio>
  <audio id="hitSound" preload="auto"></audio>
  <audio id="levelupSound" preload="auto"></audio>
  <audio id="failSound" preload="auto"></audio>

  <!-- Audio source setup -->
  <script>
    document.getElementById("bgMusic").src = "music.mp3";
    document.getElementById("voice1").src = "voice1.mp3";
    document.getElementById("voice2").src = "voice2.mp3";
    document.getElementById("runSound").src = "run.wav";
    document.getElementById("coinSound").src = "coin.wav";
    document.getElementById("jumpSound").src = "jump.wav";
    document.getElementById("hitSound").src = "hit.wav";
    document.getElementById("levelupSound").src = "levelup.wav";
    document.getElementById("failSound").src = "fail.wav";
    document.getElementById("bgMusic").loop = true;
    document.getElementById("runSound").loop = true;
  </script>

  <!-- Utility functions -->
  <script src="script.js"></script>

  <!-- Main game (THREE.js) -->
  <script type="module" src="main.js"></script>
</body>
</html>
